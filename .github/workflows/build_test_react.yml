name: Build and Test React Application 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.x]
    steps:
      - uses: actions/checkout@v2
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      #- name: Run tests
      #  run: |
      #    cd my-app
      #    npm i
      #    npm test -- --coverage

      - name: Build application
        run: |
          cd my-app
          npm i
          npm run build

  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:

      - name: Authenticate with npm 
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Check if version needs publishing
        id: version-check
        run: |
          cd my-app
          npm i
          
          # Récupère version locale
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $LOCAL_VERSION"
          
          # Récupère version npm 
          npm view chloe-leonard-ci-ynov version --silent > latest_version.txt
          NPM_VERSION=$(cat latest_version.txt 2>/dev/null)
          echo "Published version: $NPM_VERSION"
          
          if npm version $LOCAL_VERSION > /dev/null 2>&1 && npm version $NPM_VERSION > /dev/null 2>&1; then
            if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
              echo "publish=true" >> $GITHUB_OUTPUT
              echo "Local version $LOCAL_VERSION > $NPM_VERSION - Will publish"
            else
              echo "publish=false" >> $GITHUB_OUTPUT
              echo "Versions identical - Skipping publish"
            fi
          else
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "New package or invalid version - Will publish"
          fi

      - name: Build and publish to NPM
        if: steps.version-check.outputs.publish == 'true'
        run: |
          ls
          
          npm i
          git config --global user.email "chloeleo44@hotmail.com"
          git config --global user.name "chloe-leonard337"
          npm run build-npm-ci
          npm version patch
          npm publish
          git add .
          git commit -m "updated version"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip message
        if: steps.version-check.outputs.publish != 'true'
        run: echo "NPM publish skipped - version already exists"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-app/build

  deploy:
    needs: [build-and-test, publish-npm]  
    permissions: 
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4
