name: Build and Test React Application 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.x]
    steps:
      - uses: actions/checkout@v2
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      #- name: Run tests
      #  run: |
      #    cd my-app
      #    npm i
      #    npm test -- --coverage

      - name: Build application
        run: |
          cd my-app
          npm i
          npm run build

  publish-npm:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v2
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Check version and publish
        run: |
          cd my-app
          npm i
          
          # Version locale vs NPM
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local: $LOCAL_VERSION"
          
          NPM_VERSION=$(npm view chloe-leonard-ci-ynov version 2>/dev/null || echo "0.0.0")
          echo "NPM: $NPM_VERSION"
          
          if [[ "$LOCAL_VERSION" > "$NPM_VERSION" ]]; then
            echo "Publishing new version $LOCAL_VERSION"
            git config --global user.email "chloeleo44@hotmail.com"
            git config --global user.name "chloe-leonard337"
            npm run build-npm-ci
            npm version patch
            npm publish
            git add .
            git commit -m "updated version"
            git push
          else
            echo "Version already published, skipping"
            exit 0
          fi

  deploy:
    needs: [build-and-test, publish-npm]  
    permissions: 
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4
